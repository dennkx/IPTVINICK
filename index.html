<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>iNick IPTV</title>
    <link rel="stylesheet" href="css/app.css" />
    <script>
      (function () {
        var loc = window.location || {};
        var host = (loc.hostname || "").toLowerCase();
        var skipWebapis =
          host.endsWith(".vercel.app") ||
          host.endsWith(".netlify.app") ||
          host.endsWith(".github.io") ||
          host.endsWith(".pages.dev") ||
          host.endsWith(".now.sh");
        if (skipWebapis) return;
        var s = document.createElement("script");
        s.src = "$WEBAPIS/webapis/webapis.js";
        document.head.appendChild(s);
      })();
    </script>
  </head>
  <body>
    <main id="app" class="app-shell is-home">
      <div class="scene-squares" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <header class="app-header">
        <div class="brand">
          <div class="brand-tv" aria-hidden="true">IPTV</div>
          <div class="brand-copy">
            <strong>iNick</strong>
            <span>GOSTOSA</span>
            <em>PLAYER</em>
          </div>
        </div>

        <h1 id="screenTitle" class="screen-title">INICIO</h1>

        <div class="header-actions">
          <div id="clockBadge" class="clock-badge">
            <span class="clock-face" aria-hidden="true"></span>
            <strong id="clockText">--:-- --/--/----</strong>
          </div>
          <button
            id="focusSearchButton"
            class="header-icon search-action"
            data-focusable
            aria-label="Buscar"
          >
            <span aria-hidden="true"></span>
          </button>
          <button
            id="homeBackButton"
            class="header-icon back-action"
            data-focusable
            aria-label="Voltar"
          >
            <span aria-hidden="true"></span>
          </button>
          <button
            id="refreshButton"
            class="round-action refresh-action"
            data-focusable
            disabled
            aria-label="Atualizar"
          >
            <span aria-hidden="true"></span>
          </button>
        </div>
      </header>

      <section id="homeScreen" class="home-screen">
        <div class="home-grid">
          <button
            id="liveTile"
            class="home-tile live-tile"
            data-focusable
            data-view-action="live"
          >
            <span class="tile-icon tv-icon" aria-hidden="true"></span>
            <strong>Live Tv</strong>
            <small id="liveCount">0 canais</small>
          </button>

          <button
            class="home-tile movie-tile"
            data-focusable
            data-view-action="movies"
          >
            <span class="tile-icon movie-icon" aria-hidden="true"></span>
            <strong>Movies</strong>
            <small id="movieCount">0 filmes</small>
          </button>

          <button
            class="home-tile series-tile"
            data-focusable
            data-view-action="series"
          >
            <span class="tile-icon series-icon" aria-hidden="true"></span>
            <strong>Series</strong>
            <small id="seriesCount">0 séries</small>
          </button>

          <button
            class="home-tile wide-tile settings-tile"
            data-focusable
            data-view-action="settings"
          >
            <span class="tile-icon settings-icon" aria-hidden="true"></span>
            <strong>Settings</strong>
          </button>

          <button
            id="openPlaylistButton"
            class="home-tile wide-tile playlists-tile"
            data-focusable
            data-view-action="playlists"
          >
            <span class="tile-icon playlist-icon" aria-hidden="true"></span>
            <strong>Playlists</strong>
          </button>
        </div>
      </section>

      <section id="liveScreen" class="live-screen" hidden>
        <div class="live-tools">
          <label class="search-box">
            <span aria-hidden="true"></span>
            <input
              id="searchInput"
              data-focusable
              type="search"
              autocomplete="off"
              placeholder="Buscar canal ou grupo"
            />
          </label>
          <button id="clearSearchButton" class="small-command" data-focusable>
            Limpar
          </button>
        </div>

        <section class="browser">
          <aside class="groups-panel" aria-label="Grupos">
            <div class="panel-title">Categorias</div>
            <div id="groupList" class="group-list"></div>
          </aside>

          <section class="channels-panel">
            <div class="channels-header">
              <div>
                <strong id="channelCount">0 canais</strong>
                <span id="channelScope">Todos os grupos</span>
              </div>
            </div>

            <div id="emptyState" class="empty-state">
              <h2 id="emptyStateTitle">Nenhuma lista carregada</h2>
              <button
                id="emptyImportButton"
                class="command primary"
                data-focusable
              >
                Adicionar lista
              </button>
            </div>

            <div id="channelGrid" class="channel-grid"></div>
          </section>
        </section>
      </section>

      <footer class="status-footer">
        <div class="footer-chip warning-chip">
          <span aria-hidden="true">!</span>
          <strong id="playlistLabel">Sem lista</strong>
        </div>
        <div class="footer-stack">
          <div class="footer-chip">
            <span aria-hidden="true">#</span>
            <strong>MAC: 11:22:33:44:55:66</strong>
          </div>
          <div class="footer-chip now-block">
            <span aria-hidden="true">TV</span>
            <strong id="nowTitle">Nenhum canal</strong>
            <small id="nowGroup">Selecione uma lista</small>
          </div>
        </div>
      </footer>
    </main>

    <section id="playerScreen" class="player-screen" hidden>
      <object
        id="avPlayerObject"
        class="av-object"
        type="application/avplayer"
      ></object>
      <video
        id="htmlPlayer"
        class="html-player"
        playsinline
        webkit-playsinline
      ></video>

      <div id="playerOverlay" class="player-overlay">
        <header class="player-top">
          <div>
            <span id="playerGroup" class="eyebrow">Ao vivo</span>
            <h2 id="playerTitle">Canal</h2>
          </div>
          <button
            id="closePlayerButton"
            class="icon-command player-header-close"
            type="button"
            data-focusable
            aria-label="Fechar"
          >
            <span class="player-header-close-icon" aria-hidden="true"></span>
          </button>
        </header>

        <div id="playerStatus" class="player-status">Carregando</div>

        <footer class="player-bottom">
          <button
            id="prevChannelButton"
            class="command player-btn player-btn--prev"
            type="button"
            data-focusable
            aria-label="Canal anterior"
          >
            <span class="player-btn-icon" aria-hidden="true"></span>
          </button>
          <button
            id="playPauseButton"
            class="command primary player-btn player-btn--play"
            type="button"
            data-focusable
            aria-label="Pausar"
          >
            <span class="player-btn-icon" aria-hidden="true"></span>
          </button>
          <button
            id="favoriteButton"
            class="command player-btn player-btn--fav"
            type="button"
            data-focusable
            aria-label="Favorito"
            aria-pressed="false"
          >
            <span class="player-btn-icon" aria-hidden="true"></span>
          </button>
          <button
            id="fullscreenButton"
            class="command player-btn player-btn--fullscreen"
            type="button"
            data-focusable
            aria-label="Tela cheia"
            aria-pressed="false"
          >
            <span class="player-btn-icon" aria-hidden="true"></span>
          </button>
          <button
            id="nextChannelButton"
            class="command player-btn player-btn--next"
            type="button"
            data-focusable
            aria-label="Proximo canal"
          >
            <span class="player-btn-icon" aria-hidden="true"></span>
          </button>
        </footer>
      </div>
    </section>

    <section id="playlistModal" class="modal" hidden>
      <div class="modal-panel">
        <header class="modal-header">
          <div>
            <span class="eyebrow">Fonte</span>
            <h2>Lista IPTV</h2>
          </div>
          <button id="closeModalButton" class="icon-command" data-focusable>
            Fechar
          </button>
        </header>

        <div class="segmented">
          <button
            id="m3uModeButton"
            class="segment is-active"
            data-mode="m3u"
            data-focusable
          >
            M3U
          </button>
          <button
            id="xtreamModeButton"
            class="segment"
            data-mode="xtream"
            data-focusable
          >
            Xtream
          </button>
        </div>

        <form id="m3uForm" class="source-form">
          <label>
            URL M3U
            <input
              id="m3uUrlInput"
              data-focusable
              type="url"
              inputmode="url"
              autocomplete="off"
              value="https://hightechtvr1.online/get.php?username=902722181&password=575532272&type=m3u_plus&output=ts"
              placeholder="http://servidor/lista.m3u"
            />
          </label>
          <button class="command primary" data-focusable type="submit">
            Carregar M3U
          </button>
        </form>

        <form id="xtreamForm" class="source-form" hidden>
          <label>
            Servidor
            <input
              id="xtreamServerInput"
              data-focusable
              type="url"
              inputmode="url"
              autocomplete="off"
              placeholder="http://servidor:porta"
            />
          </label>
          <label>
            Usuario
            <input
              id="xtreamUserInput"
              data-focusable
              type="text"
              autocomplete="off"
            />
          </label>
          <label>
            Senha
            <input
              id="xtreamPasswordInput"
              data-focusable
              type="password"
              autocomplete="off"
            />
          </label>
          <button class="command primary" data-focusable type="submit">
            Carregar Xtream
          </button>
        </form>

        <label class="file-picker" data-focusable tabindex="0">
          Abrir arquivo M3U
          <input
            id="playlistFileInput"
            type="file"
            accept=".m3u,.m3u8,text/*"
          />
        </label>

        <p id="modalMessage" class="modal-message" aria-live="polite"></p>
      </div>
    </section>

    <div
      id="appLoader"
      class="app-loader"
      hidden
      aria-live="polite"
      aria-busy="true"
    >
      <div class="app-loader-panel">
        <div class="app-loader-brand">
          <span class="app-loader-mark">IPTV</span>
          <div class="app-loader-titles">
            <strong>iNick</strong>
            <span>GOSTOSA</span>
            <em>PLAYER</em>
          </div>
        </div>
        <p id="appLoaderStatus" class="app-loader-status">0%</p>
        <div class="app-loader-bar" aria-hidden="true">
          <span class="app-loader-bar-fill"></span>
        </div>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/app.js"></script>
  </body>
</html>
